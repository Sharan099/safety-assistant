name: CI Regulation Registry Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: safety_registry
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt -r backend/requirements.txt
        pip install sqlalchemy alembic psycopg2-binary asyncpg pgvector celery apscheduler pdfplumber pytest fakeredis pytest-cov

    - name: Run Alembic Migrations
      env:
        DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/safety_registry
      run: |
        alembic upgrade head

    - name: Run test suite with coverage
      env:
        DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/safety_registry
        REDIS_URL: redis://localhost:6379/0
        CORPUS_MODE: local
        GROQ_API_KEY: test-key-not-used
        USE_MOCK_EMBEDDINGS: "true"
        SKIP_WORKER_HEALTH: "true"
      run: |
        pytest tests/ -q --cov=. --cov-report=xml

    - name: Run auth and upload acceptance tests
      env:
        DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/safety_registry
        USE_MOCK_EMBEDDINGS: "true"
        SKIP_WORKER_HEALTH: "true"
      run: |
        pytest tests/test_auth_sessions.py tests/test_user_upload_phase_a.py -q
