# Use-case modes — pilot scope (UN R14/R16 + synthetic PROG_X)
# llm_tier_override is a FLOOR (minimum tier), not a ceiling.

modes:
  regulation_lookup:
    label: Regulation lookup
    doc_type_scope: [legal]
    hard_filters:
      doc_type: [legal]
      is_synthetic: false
    soft_boosts:
      chunk_type_table: 1.3
      has_test_procedure: 1.2
    retrieval_k: 8
    llm_tier_override: 2
    prompt_template_name: clause_citation
    grounding_min_semantic: 0.35
    grounding_min_rerank_prob: 0.25
    allow_synthetic: false
    temperature: 0

  design_review:
    label: Design review
    doc_type_scope: [legal, internal]
    hard_filters:
      doc_type: [legal, internal]
    soft_boosts:
      chunk_type_table: 1.4
      has_requirements: 1.2
    retrieval_k: 10
    llm_tier_override: 2
    prompt_template_name: design_review
    grounding_min_semantic: 0.30
    grounding_min_rerank_prob: 0.20
    allow_synthetic: true
    temperature: 0

  crash_investigation:
    label: Crash investigation
    doc_type_scope: [legal, internal]
    hard_filters:
      doc_type: [legal, internal]
    soft_boosts:
      has_loads: 1.5
      value_type_measured: 1.4
      chunk_type_table: 1.3
    retrieval_k: 12
    llm_tier_override: 3
    prompt_template_name: crash_compare
    grounding_min_semantic: 0.32
    grounding_min_rerank_prob: 0.22
    allow_synthetic: true
    temperature: 0

  root_cause_analysis:
    label: Root cause analysis
    doc_type_scope: [legal, internal]
    hard_filters:
      doc_type: [legal, internal]
    soft_boosts:
      has_loads: 1.3
      chunk_type_table: 1.2
    retrieval_k: 12
    llm_tier_override: 3
    prompt_template_name: rca_trace
    grounding_min_semantic: 0.45
    grounding_min_rerank_prob: 0.35
    allow_synthetic: true
    force_strong_reranker: true
    temperature: 0

  test_preparation:
    label: Test preparation
    doc_type_scope: [legal]
    hard_filters:
      doc_type: [legal]
      is_synthetic: false
    soft_boosts:
      has_test_procedure: 1.6
      chunk_type_procedure_step: 1.5
    retrieval_k: 10
    llm_tier_override: 2
    prompt_template_name: procedure_checklist
    grounding_min_semantic: 0.35
    grounding_min_rerank_prob: 0.25
    allow_synthetic: false
    temperature: 0

  post_test_analysis:
    label: Post-test analysis
    doc_type_scope: [legal, internal]
    hard_filters:
      doc_type: [legal, internal]
    soft_boosts:
      has_loads: 1.5
      value_type_measured: 1.4
      chunk_type_table: 1.4
    retrieval_k: 12
    llm_tier_override: 2
    prompt_template_name: post_test_compare
    grounding_min_semantic: 0.35
    grounding_min_rerank_prob: 0.25
    allow_synthetic: true
    temperature: 0

  knowledge_reuse:
    label: Knowledge reuse
    doc_type_scope: [legal, internal]
    hard_filters:
      doc_type: [legal, internal]
    soft_boosts:
      vehicle_program_match: 2.0
      chunk_type_table: 1.1
    retrieval_k: 15
    llm_tier_override: 1
    prompt_template_name: browse_summary
    grounding_min_semantic: 0.20
    grounding_min_rerank_prob: 0.12
    allow_synthetic: true
    temperature: 0.3

  management_view:
    label: Management view
    doc_type_scope: [legal, internal]
    hard_filters:
      doc_type: [legal, internal]
    soft_boosts:
      doc_type_internal: 1.3
    retrieval_k: 8
    llm_tier_override: 2
    prompt_template_name: executive_summary
    grounding_min_semantic: 0.28
    grounding_min_rerank_prob: 0.18
    allow_synthetic: true
    temperature: 0

default_mode: regulation_lookup
