services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-autosafety-rag}
      - GROQ_API_KEY=${GROQ_API_KEY}
      # SQLite DB lives on a writable named volume (output is mounted read-only).
      - APP_DB_PATH=/app/var/app.db
      # v3.0 Intelligent Multi-LLM Gateway (OFF by default — safe rollout).
      - ENABLE_GATEWAY=${ENABLE_GATEWAY:-false}
      - GATEWAY_SHADOW_MODE=${GATEWAY_SHADOW_MODE:-false}
      - GATEWAY_CANARY_PCT=${GATEWAY_CANARY_PCT:-100}
      # Local Docker should fail over quickly when a provider is unreachable.
      # Increase these in production if you want stronger retry behavior.
      - GATEWAY_PROVIDER_TIMEOUT_S=${GATEWAY_PROVIDER_TIMEOUT_S:-10}
      - GATEWAY_MAX_RETRIES=${GATEWAY_MAX_RETRIES:-0}
      - ENABLE_SEMANTIC_CACHE=${ENABLE_SEMANTIC_CACHE:-true}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_HAIKU_MODEL=${CLAUDE_HAIKU_MODEL:-claude-haiku-4-5}
      - CLAUDE_SONNET_MODEL=${CLAUDE_SONNET_MODEL:-claude-sonnet-4-5}
      # Inside Compose, Redis is reached by service name, not localhost. Use
      # DOCKER_REDIS_URL only if you intentionally want to override this.
      - REDIS_URL=${DOCKER_REDIS_URL:-redis://redis:6379/0}
      # Local Prometheus stack (docker-compose) — OFF on Railway by default.
      - ENABLE_PROMETHEUS_METRICS=${ENABLE_PROMETHEUS_METRICS:-true}
    volumes:
      - ./output:/app/output:ro
      - backend_data:/app/var
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    # redis-stack ships the RediSearch module used for vector similarity in the
    # gateway's semantic cache. Plain `redis` also works (NumPy scan fallback).
    image: redis/redis-stack:7.2.0-v9
    ports:
      - "6379:6379"
      - "8001:8001"  # RedisInsight UI (optional)
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

  gateway:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  backend_data:
  redis_data:
